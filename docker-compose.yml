services:
  api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./backend-api/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./frontend-web/.env
    environment:
      - NODE_ENV=production
      # Override the API URL to use the internal Docker network hostname
      - NEXT_PUBLIC_API_URL=http://api:3000/api
    depends_on:
      - api
    restart: unless-stopped

